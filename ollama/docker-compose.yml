version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ceorader-ollama
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_ORIGINS=*
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama-data:/root/.ollama
      - ./models:/models
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: ceorader-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ceorader-app
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=http://ollama:11434
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  ollama-data:
    driver: local
  redis-data:
    driver: local
